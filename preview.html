<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NewClaw 萌版龙虾LOGO - 3个方案预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0418, #1a0830, #0d0520);
      min-height: 100vh;
      font-family: 'Microsoft YaHei', 'SimHei', 'Noto Sans SC', sans-serif;
      color: white;
      padding: 40px 20px;
    }
    h1 {
      text-align: center;
      font-size: 2em;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #ff6080, #c080ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      text-align: center;
      color: #8888aa;
      margin-bottom: 50px;
      font-size: 1.1em;
    }
    .container {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 40px;
      flex-wrap: wrap;
      max-width: 1400px;
      margin: 0 auto;
    }
    .option {
      text-align: center;
      transition: transform 0.3s ease;
    }
    .option:hover {
      transform: scale(1.03);
    }
    .option h2 {
      font-size: 1.3em;
      margin-bottom: 15px;
      color: #c080ff;
    }
    .option .desc {
      color: #aaa;
      font-size: 0.9em;
      margin-top: 15px;
      max-width: 350px;
      line-height: 1.6;
    }
    .logo-frame {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(144, 80, 224, 0.2);
      border-radius: 20px;
      padding: 20px;
      display: inline-block;
    }
    .logo-frame img {
      width: 350px;
      height: 350px;
    }
    .tag {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 12px;
      font-size: 0.75em;
      margin: 5px 3px 0;
    }
    .tag-cute { background: rgba(255, 96, 128, 0.2); color: #ff6080; }
    .tag-tech { background: rgba(192, 128, 255, 0.2); color: #c080ff; }
    .tag-minimal { background: rgba(128, 200, 255, 0.2); color: #80c8ff; }
  </style>
</head>
<body>
  <h1>NewClaw 新龙虾 - 萌版LOGO设计方案</h1>
  <p class="subtitle">保持红紫科技配色，将凶猛龙改为可爱萌版风格</p>

  <div class="container">
    <div class="option">
      <h2>方案 A：圆润Q版龙虾</h2>
      <div class="logo-frame">
        <img src="logo-option-a.svg" alt="Option A">
      </div>
      <p class="desc">
        圆形背景 + Q版龙虾造型<br>
        大眼睛带高光，w形猫嘴微笑<br>
        小圆角、小尖牙，腮红点缀<br>
        保留额头芯片电路元素
      </p>
      <span class="tag tag-cute">萌系</span>
      <span class="tag tag-tech">科技感</span>
    </div>

    <div class="option">
      <h2>方案 B：活泼吐舌龙虾</h2>
      <div class="logo-frame">
        <img src="logo-option-b.svg" alt="Option B">
      </div>
      <p class="desc">
        圆角方形背景 + 蛋形身体<br>
        星星眼带紫色虹膜光环<br>
        吐舌微笑表情，龙须飘动<br>
        爱心装饰，浮动小心心
      </p>
      <span class="tag tag-cute">活泼</span>
      <span class="tag tag-cute">萌系</span>
    </div>

    <div class="option">
      <h2>方案 C：眯眼微笑徽章</h2>
      <div class="logo-frame">
        <img src="logo-option-c.svg" alt="Option C">
      </div>
      <p class="desc">
        六角盾形背景 + 极简脸谱<br>
        眯眯眼 (^_^) 幸福微笑<br>
        图标化龙爪 + AI芯片徽章<br>
        适合作为App图标或徽章使用
      </p>
      <span class="tag tag-minimal">简约</span>
      <span class="tag tag-tech">徽章风</span>
    </div>
  </div>
</body>
</html>
